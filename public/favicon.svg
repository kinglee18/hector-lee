<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo negro con esquinas redondeadas -->
  <rect width="32" height="32" rx="6" fill="#0d0d0d"/>

  <!-- Cuerpo del micrófono (cápsula) -->
  <rect x="12" y="4" width="8" height="14" rx="4" fill="#c9a84c"/>

  <!-- Arco del soporte -->
  <path d="M8 17 Q8 24 16 24 Q24 24 24 17"
        stroke="#c9a84c" stroke-width="2"
        fill="none" stroke-linecap="round"/>

  <!-- Pie vertical -->
  <line x1="16" y1="24" x2="16" y2="28"
        stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>

  <!-- Base horizontal -->
  <line x1="11" y1="28" x2="21" y2="28"
        stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
</svg>
